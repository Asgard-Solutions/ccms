name: Docs guard

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  changelog-guard:
    name: CHANGELOG.md is updated when code changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make guard script executable
        run: chmod +x scripts/check_changelog.sh

      - name: Run CHANGELOG guard
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: ./scripts/check_changelog.sh

  docs-matrix-hint:
    name: Docs policy reminder
    runs-on: ubuntu-latest
    needs: changelog-guard
    if: ${{ always() }}
    steps:
      - name: Post policy pointer on failure
        if: ${{ needs.changelog-guard.result == 'failure' }}
        run: |
          echo "::error title=Docs not updated::Your PR changed code under backend/ or frontend/ but did not update CHANGELOG.md."
          echo "::notice title=Docs policy::See docs/DOC_UPDATE_POLICY.md for the full matrix of which docs to update per change type."
