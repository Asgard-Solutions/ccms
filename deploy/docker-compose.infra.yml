# Long-running SHARED infrastructure for ChiroPro blue/green.
# Owns only the shared network + shared datastores (MongoDB + Redis). The
# blue/green *app* containers (backend + frontend, per colour) are managed
# independently by deploy.sh via `docker run`.
#
#   docker compose -f docker-compose.infra.yml up -d
#
# `chiro_net` is created by init-vps.sh (external) so app containers started
# with `docker run --network chiro_net` can reach `chiro_mongo` / `chiro_redis`.

services:
  chiro_mongo:
    image: mongo:7
    container_name: chiro_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-chiro}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required in .env}
    volumes:
      - chiro_mongo_data:/data/db
    # Bind to localhost only for admin; app reaches it over chiro_net. Never
    # expose 27017 publicly (PHI!).
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - chiro_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  chiro_redis:
    image: redis:7-alpine
    container_name: chiro_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required in .env}", "--appendonly", "yes"]
    volumes:
      - chiro_redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - chiro_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chiro_mongo_data:
    name: chiro_mongo_data
  chiro_redis_data:
    name: chiro_redis_data

networks:
  chiro_net:
    external: true
    name: chiro_net
