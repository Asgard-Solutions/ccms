# SWITCHABLE upstreams for ChiroPro blue/green.
# Install to: /etc/nginx/conf.d/chiropro-active.conf
# Rewritten by scripts/switch.sh on every deploy/rollback (then nginx reload).
# Defaults point at BLUE. Ports: frontend blue 8081 / green 8082,
#                                backend  blue 9001 / green 9002.

upstream chiropro_frontend {
    server 127.0.0.1:8081 max_fails=3 fail_timeout=10s;  # active: blue
}
upstream chiropro_backend {
    server 127.0.0.1:9001 max_fails=3 fail_timeout=10s;  # active: blue
}
