# In-container Nginx for the ChiroPro frontend SPA (listens on :3000).
# Serves the static CRA build + SPA routing. Separate from the host/edge Nginx.

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend container health endpoint (used by deploy.sh + Docker HEALTHCHECK).
    # Named /healthz so it never collides with the app's /api/* (which the host
    # Nginx routes to the backend, not here).
    location = /healthz {
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
